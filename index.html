<!DOCTYPE html>
<html>
<head>
    <title>Payment Page</title>
</head>
<body style="text-align:center; font-family:Arial; margin-top:100px;">

    <h1>💳 Payment Page</h1>
    <p>Amount: ₹500</p>

    <button onclick="pay()" style="padding:10px 20px; font-size:16px;">
        Pay Now
    </button>

    <script>
        function pay() {
            alert("✅ Payment Successful!");

            let msg = new SpeechSynthesisUtterance("Payment successful");
            window.speechSynthesis.speak(msg);
        }
    </script>

</body>
</html>
