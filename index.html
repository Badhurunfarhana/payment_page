<!DOCTYPE html>
<html>
<head>
    <title>Payment Page</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .box {
            margin-top: 100px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            display: inline-block;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>💳 Payment Page</h1>
    <p>Amount: ₹500</p>
    <button onclick="pay()">Pay Now</button>
</div>

<script>
function pay() {
    alert("✅ Payment Successful!");
}
</script>

</body>
</html>
